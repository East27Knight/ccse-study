<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CCSE Study App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f0f;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --green: #00c853;
  --red: #ff1744;
  --text: #f5f5f5;
  --text2: #aaa;
  --radius: 12px;
}
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* Navigation */
.nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 12px 8px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  border-bottom: 1px solid #333;
}
.nav-btn {
  padding: 10px 16px;
  border: none;
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text2);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn.active {
  background: var(--accent);
  color: white;
}

/* Dashboard */
.dashboard {
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
}
.stat-num {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-label {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 2px;
}

/* Progress bars */
.tarea-progress {
  margin-bottom: 8px;
}
.tarea-header {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  margin-bottom: 4px;
  color: var(--text2);
}
.progress-bar {
  height: 8px;
  background: var(--surface);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 4px;
  transition: width 0.3s;
}

/* Tarea filter chips */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.chip {
  padding: 8px 14px;
  border: 1px solid #444;
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  font-size: 0.8rem;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.chip.active {
  background: var(--accent2);
  border-color: var(--accent);
  color: var(--text);
}

/* Question card */
.question-area {
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}
.q-counter {
  font-size: 0.75rem;
  color: var(--text2);
  margin-bottom: 8px;
}
.q-tarea-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--accent2);
  font-size: 0.7rem;
  color: var(--text);
  margin-bottom: 10px;
}
.q-text {
  font-size: 1.15rem;
  line-height: 1.5;
  margin-bottom: 20px;
  font-weight: 500;
}
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.option-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #333;
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
}
.option-btn:active {
  transform: scale(0.98);
}
.option-btn.correct {
  border-color: var(--green);
  background: #00c85322;
}
.option-btn.wrong {
  border-color: var(--red);
  background: #ff174422;
}
.option-btn.reveal-correct {
  border-color: var(--green);
  background: #00c85322;
}

/* Action buttons */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.action-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-next {
  background: var(--accent);
  color: white;
}
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
}

/* Exam mode */
.exam-setup {
  padding: 24px 16px;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.exam-setup h2 {
  margin-bottom: 16px;
}
.exam-info {
  color: var(--text2);
  font-size: 0.9rem;
  margin-bottom: 24px;
  line-height: 1.6;
}
.start-btn {
  padding: 16px 48px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
}
.timer {
  position: fixed;
  top: 56px;
  right: 12px;
  padding: 6px 12px;
  background: var(--surface);
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  z-index: 99;
}
.timer.warning { color: var(--red); }

/* Results */
.results {
  padding: 24px 16px;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.results h2 { margin-bottom: 12px; }
.score-big {
  font-size: 4rem;
  font-weight: 800;
  margin: 16px 0;
}
.score-big.pass { color: var(--green); }
.score-big.fail { color: var(--red); }
.results-detail {
  color: var(--text2);
  margin-bottom: 24px;
  font-size: 0.95rem;
}

/* Review wrong answers */
.review-section {
  text-align: left;
  margin-top: 24px;
}
.review-section h3 {
  margin-bottom: 12px;
  color: var(--red);
}
.review-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.review-q { font-weight: 500; margin-bottom: 8px; }
.review-wrong { color: var(--red); font-size: 0.85rem; }
.review-correct { color: var(--green); font-size: 0.85rem; font-weight: 600; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text2);
}
.empty-state h3 { margin-bottom: 8px; color: var(--text); }

/* Hint */
.hint-bar {
  padding: 10px 16px;
  background: #1a3a1a;
  border-left: 3px solid var(--green);
  font-size: 0.8rem;
  color: var(--green);
  margin: 0 16px 16px;
  border-radius: 0 var(--radius) var(--radius) 0;
}

/* Countdown bar */
.countdown-bar {
  text-align: center;
  padding: 12px;
  color: var(--text2);
  font-size: 0.9rem;
  font-weight: 600;
  margin-top: 12px;
}
.countdown-bar span {
  color: var(--accent);
  font-size: 1.1rem;
}

/* Responsive */
@media (max-width: 400px) {
  html { font-size: 15px; }
  .nav-btn { padding: 8px 12px; font-size: 0.8rem; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-num { font-size: 1.3rem; }
}
</style>
</head>

// ============================================================
// STATE
// ============================================================
const TAREA_NAMES = {
  1: 'Gobierno y legislación',
  2: 'Derechos y deberes',
  3: 'Geografía',
  4: 'Cultura e historia',
  5: 'Sociedad'
};

const EXAM_DISTRIBUTION = { 1: 10, 2: 3, 3: 2, 4: 3, 5: 7 }; // 25 total

let state = {
  mode: 'study', // study, exam, weak
  filter: 0, // 0=all, 1-5=tarea
  currentIndex: 0,
  answered: false,
  selectedOption: -1,
  // Exam state
  examActive: false,
  examQuestions: [],
  examIndex: 0,
  examAnswers: [],
  examStartTime: null,
  examTimerInterval: null,
  // Progress (persisted)
  progress: loadProgress(),
};

function loadProgress() {
  try {
    const saved = localStorage.getItem('ccse_progress');
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
}

function saveProgress() {
  localStorage.setItem('ccse_progress', JSON.stringify(state.progress));
}

function markQuestion(qid, correct) {
  if (!state.progress[qid]) {
    state.progress[qid] = { correct: 0, wrong: 0, lastSeen: 0 };
  }
  if (correct) {
    state.progress[qid].correct++;
  } else {
    state.progress[qid].wrong++;
  }
  state.progress[qid].lastSeen = Date.now();
  saveProgress();
}

function getFiltered() {
  if (state.shuffledOrder) return state.shuffledOrder;
  if (state.filter === 0) return QUESTIONS;
  return QUESTIONS.filter(q => q.tarea === state.filter);
}

function getWeakQuestions() {
  return QUESTIONS.filter(q => {
    const p = state.progress[q.id];
    if (!p) return false;
    return p.wrong > 0 && p.wrong >= p.correct;
  });
}

function getStats() {
  let mastered = 0, seen = 0, weak = 0;
  QUESTIONS.forEach(q => {
    const p = state.progress[q.id];
    if (p) {
      seen++;
      if (p.correct > p.wrong) mastered++;
      if (p.wrong > 0 && p.wrong >= p.correct) weak++;
    }
  });
  return { total: 300, mastered, seen, weak, unseen: 300 - seen };
}

function getTareaStats(tarea) {
  const qs = QUESTIONS.filter(q => q.tarea === tarea);
  let mastered = 0;
  qs.forEach(q => {
    const p = state.progress[q.id];
    if (p && p.correct > p.wrong) mastered++;
  });
  return { total: qs.length, mastered };
}

// ============================================================
// RENDERING
// ============================================================
const app = document.getElementById('app');

function switchMode(mode) {
  state.mode = mode;
  state.answered = false;
  state.currentIndex = 0;
  if (state.examTimerInterval) {
    clearInterval(state.examTimerInterval);
    state.examTimerInterval = null;
  }
  state.examActive = false;
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['study','exam','weak'][i] === mode);
  });
  render();
}

function render() {
  switch (state.mode) {
    case 'study': renderStudy(); break;
    case 'exam': state.examActive ? renderExamQuestion() : renderExamSetup(); break;
    case 'weak': renderWeak(); break;
  }
}

function renderStudy() {
  const stats = getStats();
  const filtered = getFiltered();

  let html = '<div class="dashboard">';

  // Stats row
  html += '<div class="stats-grid">';
  html += `<div class="stat-card"><div class="stat-num">${stats.mastered}</div><div class="stat-label">Dominadas</div></div>`;
  html += `<div class="stat-card"><div class="stat-num">${stats.seen}</div><div class="stat-label">Vistas</div></div>`;
  html += `<div class="stat-card"><div class="stat-num">${stats.weak}</div><div class="stat-label">Por repasar</div></div>`;
  html += '</div>';

  // Tarea progress bars
  for (let t = 1; t <= 5; t++) {
    const ts = getTareaStats(t);
    const pct = ts.total > 0 ? Math.round(ts.mastered / ts.total * 100) : 0;
    html += `<div class="tarea-progress">
      <div class="tarea-header"><span>T${t} ${TAREA_NAMES[t]}</span><span>${ts.mastered}/${ts.total}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  html += '</div>';

  // Filter chips
  html += '<div class="filter-row">';
  html += `<button class="chip ${state.filter===0?'active':''}" onclick="setFilter(0)">Todas (300)</button>`;
  for (let t = 1; t <= 5; t++) {
    const count = QUESTIONS.filter(q => q.tarea === t).length;
    html += `<button class="chip ${state.filter===t?'active':''}" onclick="setFilter(${t})">T${t} (${count})</button>`;
  }
  html += `<button class="chip" onclick="shuffleStudy()" style="background:var(--accent2);border-color:var(--accent)">⟳ Mezclar</button>`;
  html += '</div>';

  // Hint
  html += '<div class="hint-bar">Sin penalización por errores — ¡adivina si no lo sabes!</div>';

  // Current question
  if (filtered.length > 0) {
    if (state.currentIndex >= filtered.length) state.currentIndex = 0;
    html += renderQuestionCard(filtered[state.currentIndex], state.currentIndex + 1, filtered.length, 'study');
  }

  app.innerHTML = html;
}

function renderQuestionCard(q, num, total, context) {
  let html = '<div class="question-area">';
  html += `<div class="q-counter">Pregunta ${num} de ${total}</div>`;
  html += `<div class="q-tarea-badge">Tarea ${q.tarea} — ${TAREA_NAMES[q.tarea]}</div>`;
  html += `<div class="q-text">${escHtml(q.question)}</div>`;

  html += '<div class="options-list">';
  q.options.forEach((opt, i) => {
    let cls = 'option-btn';
    if (state.answered) {
      if (i === q.correct) cls += ' correct reveal-correct';
      else if (i === state.selectedOption) cls += ' wrong';
    }
    const disabled = state.answered ? 'disabled' : '';
    html += `<button class="${cls}" ${disabled} onclick="${context === 'exam' ? 'examAnswer' : 'studyAnswer'}(${i})">${escHtml(opt)}</button>`;
  });
  html += '</div>';

  if (state.answered && (state.selectedOption !== q.correct || state.mode === 'weak')) {
    html += `<div class="countdown-bar" id="countdown-bar">Siguiente en <span id="countdown-num">${state.countdownLeft || 4}</span>s</div>`;
  }

  html += '</div>';
  return html;
}

function renderExamSetup() {
  let html = '<div class="exam-setup">';
  html += '<h2>Simulacro de Examen</h2>';
  html += `<div class="exam-info">
    <strong>25 preguntas</strong> extraídas como en el examen real:<br>
    T1: 10 · T2: 3 · T3: 2 · T4: 3 · T5: 7<br><br>
    ⏱ 45 minutos · Aprobado: 15/25 (60%)<br>
    Sin penalización por errores
  </div>`;
  html += '<button class="start-btn" onclick="startExam()">Comenzar examen</button>';
  html += '</div>';
  app.innerHTML = html;
}

function renderExamQuestion() {
  if (state.examIndex >= state.examQuestions.length) {
    renderExamResults();
    return;
  }

  const q = state.examQuestions[state.examIndex];
  let html = renderQuestionCard(q, state.examIndex + 1, 25, 'exam');

  // Timer
  const elapsed = Math.floor((Date.now() - state.examStartTime) / 1000);
  const remaining = Math.max(0, 45 * 60 - elapsed);
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const timerClass = remaining < 300 ? 'timer warning' : 'timer';
  html = `<div class="${timerClass}">${mins}:${String(secs).padStart(2,'0')}</div>` + html;

  app.innerHTML = html;
}

function renderExamResults() {
  if (state.examTimerInterval) {
    clearInterval(state.examTimerInterval);
    state.examTimerInterval = null;
  }

  let correct = 0;
  const wrong = [];
  state.examQuestions.forEach((q, i) => {
    if (state.examAnswers[i] === q.correct) {
      correct++;
    } else {
      wrong.push({ q, selected: state.examAnswers[i] });
    }
  });

  const passed = correct >= 15;
  const elapsed = Math.floor((Date.now() - state.examStartTime) / 1000);
  const mins = Math.floor(elapsed / 60);

  let html = '<div class="results">';
  html += `<h2>${passed ? '¡Aprobado!' : 'No aprobado'}</h2>`;
  html += `<div class="score-big ${passed ? 'pass' : 'fail'}">${correct}/25</div>`;
  html += `<div class="results-detail">
    ${Math.round(correct/25*100)}% · Necesitas 60% (15/25)<br>
    Tiempo: ${mins} minutos
  </div>`;
  html += `<button class="start-btn" onclick="switchMode('exam')" style="margin-bottom:24px">Repetir examen</button>`;

  if (wrong.length > 0) {
    html += '<div class="review-section">';
    html += `<h3>Respuestas incorrectas (${wrong.length})</h3>`;
    wrong.forEach(({ q, selected }) => {
      html += `<div class="review-item">
        <div class="review-q">${escHtml(q.question)}</div>
        ${selected >= 0 ? `<div class="review-wrong">✗ ${escHtml(q.options[selected])}</div>` : '<div class="review-wrong">✗ Sin respuesta</div>'}
        <div class="review-correct">✓ ${escHtml(q.options[q.correct])}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  app.innerHTML = html;
  state.examActive = false;
}

function renderWeak() {
  const weak = getWeakQuestions();

  if (weak.length === 0) {
    app.innerHTML = `<div class="empty-state">
      <h3>¡No hay preguntas para repasar!</h3>
      <p>Las preguntas que falles aparecerán aquí para que las repases.</p>
      <br>
      <button class="action-btn btn-next" onclick="switchMode('study')" style="max-width:200px;margin:0 auto">Ir a estudiar</button>
    </div>`;
    return;
  }

  // Sort: most wrong first
  weak.sort((a, b) => {
    const pa = state.progress[a.id] || { wrong: 0 };
    const pb = state.progress[b.id] || { wrong: 0 };
    return pb.wrong - pa.wrong;
  });

  if (state.currentIndex >= weak.length) state.currentIndex = 0;

  let html = `<div class="hint-bar">Tienes ${weak.length} preguntas para repasar</div>`;
  html += renderQuestionCard(weak[state.currentIndex], state.currentIndex + 1, weak.length, 'study');
  app.innerHTML = html;
}

// ============================================================
// INTERACTIONS
// ============================================================
function setFilter(t) {
  state.filter = t;
  state.currentIndex = 0;
  state.answered = false;
  state.selectedOption = -1;
  state.shuffledOrder = null;
  render();
}

function shuffleStudy() {
  const base = state.filter === 0 ? QUESTIONS : QUESTIONS.filter(q => q.tarea === state.filter);
  state.shuffledOrder = shuffle([...base]);
  state.currentIndex = 0;
  state.answered = false;
  state.selectedOption = -1;
  render();
}

let autoAdvanceTimer = null;

function clearAutoAdvance() {
  if (autoAdvanceTimer) { clearInterval(autoAdvanceTimer); autoAdvanceTimer = null; }
}

function studyAnswer(optIdx) {
  if (state.answered) return;
  clearAutoAdvance();
  state.answered = true;
  state.selectedOption = optIdx;

  const filtered = state.mode === 'weak' ? getWeakQuestions() : getFiltered();
  const q = filtered[state.currentIndex];
  const isCorrect = optIdx === q.correct;
  markQuestion(q.id, isCorrect);

  if (state.mode === 'weak') {
    // Repasar: DON'T full re-render (list may have shifted).
    // Just highlight buttons in place, show countdown, then advance after 4s.
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct', 'reveal-correct');
      else if (i === optIdx) btn.classList.add('wrong');
    });
    // Inject countdown bar
    const qa = document.querySelector('.question-area');
    if (qa) {
      const cd = document.createElement('div');
      cd.className = 'countdown-bar';
      cd.id = 'countdown-bar';
      cd.innerHTML = 'Siguiente en <span id="countdown-num">4</span>s';
      qa.appendChild(cd);
    }
    state.countdownLeft = 4;
    autoAdvanceTimer = setInterval(() => {
      state.countdownLeft--;
      const el = document.getElementById('countdown-num');
      if (el) el.textContent = state.countdownLeft;
      if (state.countdownLeft <= 0) {
        clearAutoAdvance();
        state.answered = false;
        state.selectedOption = -1;
        const newList = getWeakQuestions();
        if (newList.length === 0) { state.currentIndex = 0; render(); return; }
        if (!isCorrect) state.currentIndex = (state.currentIndex + 1) % newList.length;
        else if (state.currentIndex >= newList.length) state.currentIndex = 0;
        render();
      }
    }, 1000);
  } else {
    render();
  }

  if (state.mode !== 'weak') {
    if (isCorrect) {
      setTimeout(() => nextStudyQuestion(), 600);
    } else {
      state.countdownLeft = 4;
      autoAdvanceTimer = setInterval(() => {
        state.countdownLeft--;
        const el = document.getElementById('countdown-num');
        if (el) el.textContent = state.countdownLeft;
        if (state.countdownLeft <= 0) {
          clearAutoAdvance();
          nextStudyQuestion();
        }
      }, 1000);
    }
  }
}

function nextStudyQuestion() {
  clearAutoAdvance();
  const filtered = state.mode === 'weak' ? getWeakQuestions() : getFiltered();
  if (filtered.length === 0) { state.currentIndex = 0; render(); return; }
  state.currentIndex = (state.currentIndex + 1) % filtered.length;
  state.answered = false;
  state.selectedOption = -1;
  render();
  window.scrollTo(0, document.querySelector('.question-area')?.offsetTop - 60 || 0);
}

function startExam() {
  // Build exam: 10+3+2+3+7 = 25
  state.examQuestions = [];
  for (const [tarea, count] of Object.entries(EXAM_DISTRIBUTION)) {
    const pool = QUESTIONS.filter(q => q.tarea === parseInt(tarea));
    const shuffled = shuffle([...pool]);
    state.examQuestions.push(...shuffled.slice(0, count));
  }
  state.examQuestions = shuffle(state.examQuestions);
  state.examAnswers = new Array(25).fill(-1);
  state.examIndex = 0;
  state.examActive = true;
  state.examStartTime = Date.now();
  state.answered = false;
  state.selectedOption = -1;

  // Timer
  state.examTimerInterval = setInterval(() => {
    const elapsed = (Date.now() - state.examStartTime) / 1000;
    if (elapsed >= 45 * 60) {
      renderExamResults();
    } else {
      // Update timer display
      const remaining = Math.max(0, 45 * 60 - Math.floor(elapsed));
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      const timerEl = document.querySelector('.timer');
      if (timerEl) {
        timerEl.textContent = `${mins}:${String(secs).padStart(2,'0')}`;
        timerEl.classList.toggle('warning', remaining < 300);
      }
    }
  }, 1000);

  render();
}

function examAnswer(optIdx) {
  if (state.answered) return;
  clearAutoAdvance();
  state.answered = true;
  state.selectedOption = optIdx;
  state.examAnswers[state.examIndex] = optIdx;

  const q = state.examQuestions[state.examIndex];
  const isCorrect = optIdx === q.correct;
  markQuestion(q.id, isCorrect);
  render();

  if (isCorrect) {
    setTimeout(() => nextExamQuestion(), 600);
  } else {
    state.countdownLeft = 4;
    autoAdvanceTimer = setInterval(() => {
      state.countdownLeft--;
      const el = document.getElementById('countdown-num');
      if (el) el.textContent = state.countdownLeft;
      if (state.countdownLeft <= 0) {
        clearAutoAdvance();
        nextExamQuestion();
      }
    }, 1000);
  }
}

function nextExamQuestion() {
  clearAutoAdvance();
  state.examIndex++;
  state.answered = false;
  state.selectedOption = -1;
  render();
  window.scrollTo(0, 0);
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Reset progress button (hidden keyboard shortcut: triple-tap header)
let tapCount = 0;
document.querySelector('.nav').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    tapCount++;
    if (tapCount >= 5) {
      if (confirm('¿Resetear todo el progreso?')) {
        state.progress = {};
        saveProgress();
        render();
      }
      tapCount = 0;
    }
    setTimeout(() => tapCount = 0, 2000);
  }
});

// Initial render
render();
</script>
